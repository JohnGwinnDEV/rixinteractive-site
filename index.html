<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rix Interactive</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0b0f1a, #05070d);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .tagline {
      font-size: 1.3rem;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .product {
      margin-top: 20px;
      font-size: 1rem;
      opacity: 0.7;
    }

    .highlight {
      color: #00d4ff;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Rix Interactive</h1>

    <div class="tagline">
      Building intelligent systems<br />
      through story and play.
    </div>

    <div class="product">
      Creators of <span class="highlight">Chronicles: The Learning Rift</span>
    </div>
  </div>
</body>
</html>
